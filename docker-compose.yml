services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - ENGINE_URL=http://engine:8081
      - DASHBOARD_URL=http://dashboard:8082
      - GATEWAY_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - nexusflow

  engine:
    build: ./engine
    ports:
      - "${ENGINE_PORT:-8081}:8081"
    environment:
      - ENGINE_PORT=8081
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - nexusflow

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-8082}:8082"
    environment:
      - GATEWAY_URL=http://gateway:8080
      - DASHBOARD_PORT=8082
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - nexusflow

networks:
  nexusflow:
    driver: bridge
